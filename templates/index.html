<!DOCTYPE html>
<html>
<head>
<title>Job Portal</title>
</head>

<body>

<h2>Add Job</h2>

<form method="POST">
Job Title:
<input type="text" name="title"><br><br>

Company:
<input type="text" name="company"><br><br>

<button type="submit">Add Job</button>
</form>

<h2>Job List</h2>

<ul>
{% for job in jobs %}
<li>{{ job.title }} - {{ job.company }}</li>
{% endfor %}
</ul>

</body>
</html>
